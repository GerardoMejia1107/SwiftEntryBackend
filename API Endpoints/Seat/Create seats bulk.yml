info:
  name: Create seats bulk
  type: http
  seq: 1

http:
  method: POST
  url: "{{swift_entry_base_uri}}/seats/bulk"
  body:
    type: json
    data: |-
      {
        "localityId": 1,
        "seatsPerRow": 10,
        "rowLabels": ["A", "B", "C"]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
