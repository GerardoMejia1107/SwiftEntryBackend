info:
  name: Create seats bulk
  type: http
  seq: 1

http:
  method: POST
  url: "{{swift_entry_base_uri}}/seats/bulk"
  body:
    type: json
    data: |-
      {
        "localityName": "GENERAL",
        "eventId": 20,
        "seatsPerRow": 5,
        "rowLabels": ["D", "F"]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
