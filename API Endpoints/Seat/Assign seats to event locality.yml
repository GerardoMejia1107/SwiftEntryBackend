info:
  name: Assign seats to event locality
  type: http
  seq: 5

http:
  method: POST
  url: "{{swift_entry_base_uri}}/seats/assign"
  body:
    type: json
    data: |-
      {
        "localityId": 20,
        "seats": [
          "A1",
          "A2",
          "A3",
          "A4",
          "A5",
          "A6"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
