info:
  name: Get unread count
  type: http
  seq: 3

http:
  method: GET
  url: "{{swift_entry_base_uri}}/notifications/me/unread-count"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
