info:
  name: Mark notification as read
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{swift_entry_base_uri}}/notifications/1/read"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
