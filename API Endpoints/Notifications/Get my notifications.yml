info:
  name: Get my notifications
  type: http
  seq: 1

http:
  method: GET
  url: "{{swift_entry_base_uri}}/notifications/me"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
