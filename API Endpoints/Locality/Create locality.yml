info:
  name: Create locality
  type: http
  seq: 1

http:
  method: POST
  url: "{{swift_entry_base_uri}}/localities"
  body:
    type: json
    data: |-
      {
        "eventId": 18,
        "name": "VIP",
        "description": "Localidad VIP cercana al escenario",
        "price": 75.00,
        "capacity": 10,
        "availableSlots": 5
